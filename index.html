<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENT NDM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>ENT NDM</header>

<div class="card" id="login">

<h2>Connexion</h2>

<input id="email" placeholder="Email">
<input id="mdp" type="password" placeholder="Mot de passe">

<button onclick="connexion()">Se connecter</button>

<p>
Compte test :<br>
email : directeur@ndm.fr<br>
mdp : 1234
</p>

</div>

<div class="card" id="menu" style="display:none">

<h2 id="bonjour"></h2>

<div class="box" onclick="ouvrir('edt')">📅 Emploi du temps</div>
<div class="box" onclick="ouvrir('notes')">📊 Notes</div>
<div class="box" onclick="ouvrir('devoirs')">📚 Devoirs</div>
<div class="box" onclick="ouvrir('messages')">💬 Messagerie</div>
<div class="box" onclick="ouvrir('viesco')">⚠️ Vie scolaire</div>
<div class="box" onclick="ouvrir('cdi')">💻 CDI</div>

</div>

<div class="card page" id="edt">
<h2>Emploi du temps</h2>
<p>Lundi : Maths</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="notes">
<h2>Notes</h2>
<p>Aucune note</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="devoirs">
<h2>Devoirs</h2>
<p>Aucun devoir</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="messages">
<h2>Messagerie</h2>
<input placeholder="Message">
<button>Envoyer</button>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="viesco">
<h2>Vie scolaire</h2>
<p>Remarques</p>
<p>Colles</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="cdi">
<h2>CDI</h2>
<p>Prêt ordinateur</p>
<button onclick="retour()">Retour</button>
</div>

<script src="script.js"></script>

</body>
</html>
