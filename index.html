<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENT Pro NDM</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1e3a;
color:white;
}

header{
background:#1565c0;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:white;
color:black;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:20px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#1565c0;
color:white;
border:none;
cursor:pointer;
}

.menu{
display:none;
}

.box{
background:#1565c0;
color:white;
padding:15px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.page{
display:none;
}

.back{
margin-top:20px;
}
</style>
</head>

<body>

<header>ENT Pro NDM</header>

<div class="card" id="login">

<h2>Connexion</h2>

<input id="nom" placeholder="Nom">

<select id="role">
<option>Élève</option>
<option>Professeur</option>
<option>Délégué</option>
<option>Sous-délégué</option>
<option>Administration</option>
</select>

<button onclick="connexion()">Connexion</button>

</div>

<div class="card menu" id="menu">

<h2 id="bonjour"></h2>

<div class="box" onclick="ouvrir('appel')">📝 Faire l'appel</div>
<div class="box" onclick="ouvrir('devoirs')">📚 Devoirs</div>
<div class="box" onclick="ouvrir('messages')">💬 Messagerie</div>

</div>

<div class="card page" id="appel">

<h2>Appel</h2>

<label><input type="checkbox"> Élève 1</label><br>
<label><input type="checkbox"> Élève 2</label><br>
<label><input type="checkbox"> Élève 3</label><br>

<button>Enregistrer</button>

<button class="back" onclick="retour()">
Retour
</button>

</div>

<div class="card page" id="devoirs">

<h2>Devoirs</h2>

<ul>
<li>Maths : Exercice 5</li>
<li>Français : Lecture chapitre 2</li>
</ul>

<button class="back" onclick="retour()">
Retour
</button>

</div>

<div class="card page" id="messages">

<h2>Messagerie</h2>

<input placeholder="Écrire un message">

<button>Envoyer</button>

<button class="back" onclick="retour()">
Retour
</button>

</div>

<script>

function connexion(){

let nom=document.getElementById("nom").value;
let role=document.getElementById("role").value;

document.getElementById("login").style.display="none";

document.getElementById("menu").style.display="block";

document.getElementById("bonjour").innerHTML=
"Bienvenue "+nom+"<br>"+role;

}

function ouvrir(page){

document.getElementById("menu").style.display="none";

document.getElementById(page).style.display="block";

}

function retour(){

document.querySelectorAll(".page").forEach(
p=>p.style.display="none"
);

document.getElementById("menu").style.display="block";

}

</script>

</body>
</html>
