<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ENT NDM</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
ENT NDM
</header>

<div class="card" id="login">

<h2>Connexion</h2>

<input id="nom" placeholder="Nom">

<select id="role">

<option>Élève</option>
<option>Parent</option>
<option>Professeur</option>
<option>CPE</option>
<option>Administration</option>
<option>Délégué</option>
<option>Sous-délégué</option>
<option>Infirmière</option>
<option>Secrétariat</option>

</select>

<button onclick="connexion()">
Connexion
</button>

</div>

<div class="card" id="menu" style="display:none;">

<h2 id="bonjour"></h2>

<div class="box" onclick="ouvrir('edt')">
📅 Emploi du temps
</div>

<div class="box" onclick="ouvrir('notes')">
📊 Notes
</div>

<div class="box" onclick="ouvrir('devoirs')">
📚 Devoirs
</div>

<div class="box" onclick="ouvrir('messages')">
💬 Messagerie
</div>

<div class="box" id="appelBtn" onclick="ouvrir('appel')">
📝 Appel
</div>

<div class="box" onclick="ouvrir('viesco')">
⚠️ Vie scolaire
</div>

<div class="box" onclick="ouvrir('cdi')">
💻 CDI
</div>

</div>

<div class="card page" id="edt">
<h2>Emploi du temps</h2>
<p>Lundi : Maths</p>
<p>Mardi : Français</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="notes">
<h2>Notes</h2>
<p>Aucune note enregistrée</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="devoirs">
<h2>Devoirs</h2>
<p>Aucun devoir</p>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="messages">
<h2>Messagerie</h2>
<input placeholder="Votre message">
<button>Envoyer</button>
<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="appel">
<h2>Appel</h2>

<label><input type="checkbox"> Élève 1 présent</label><br>
<label><input type="checkbox"> Élève 2 présent</label><br>
<label><input type="checkbox"> Élève 3 présent</label><br>

<button>Enregistrer</button>

<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="viesco">
<h2>Vie scolaire</h2>

<p>Remarques</p>
<p>Observations</p>
<p>Heures de colle</p>
<p>Sanctions</p>

<button onclick="retour()">Retour</button>
</div>

<div class="card page" id="cdi">
<h2>CDI</h2>

<input placeholder="Nom élève">

<select>
<option>PC-01</option>
<option>PC-02</option>
<option>PC-03</option>
</select>

<button>Prêter ordinateur</button>

<button onclick="retour()">Retour</button>
</div>

<script src="script.js"></script>

</body>
</html>
