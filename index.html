<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENT Pro NDM</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1e3a;
color:white;
}

header{
background:#1565c0;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:white;
color:black;
max-width:700px;
margin:20px auto;
padding:20px;
border-radius:15px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
}

button{
background:#1565c0;
color:white;
border:none;
cursor:pointer;
}

.menu,.page{
display:none;
}

.box{
background:#1565c0;
color:white;
padding:15px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>ENT Pro NDM</header>

<div class="card" id="login">

<h2>Connexion</h2>

<input id="nom" placeholder="Nom">

<select id="role">

<option>Élève</option>
<option>Professeur</option>
<option>CPE</option>
<option>Délégué</option>
<option>Sous-délégué</option>
<option>Parent</option>
<option>Administration</option>

</select>

<button onclick="connexion()">
Connexion
</button>

</div>

<div class="card menu" id="menu">

<h2 id="bonjour"></h2>

<div class="box" onclick="ouvrir('edt')">
📅 Emploi du temps
</div>

<div class="box" id="appelBtn" onclick="ouvrir('appel')">
📝 Faire l'appel
</div>

<div class="box" onclick="ouvrir('devoirs')">
📚 Devoirs
</div>

<div class="box" onclick="ouvrir('cdi')">
💻 CDI
</div>

</div>

<div class="card page" id="edt">

<h2>Emploi du temps</h2>

<p>Lundi : Maths 8h-9h</p>
<p>Mardi : Français 10h-11h</p>

<button onclick="retour()">Retour</button>

</div>

<div class="card page" id="appel">

<h2>Appel</h2>

<label><input type="checkbox"> Élève 1 présent</label><br>
<label><input type="checkbox"> Élève 2 présent</label><br>
<label><input type="checkbox"> Élève 3 présent</label><br>

<button>Enregistrer</button>

<button onclick="retour()">Retour</button>

</div>

<div class="card page" id="devoirs">

<h2>Devoirs</h2>

<ul>
<li>Maths : Exercice 5</li>
<li>Français : Lecture chapitre 2</li>
</ul>

<button onclick="retour()">Retour</button>

</div>

<div class="card page" id="cdi">

<h2>Prêt ordinateur CDI</h2>

<input placeholder="Nom élève">

<select>
<option>PC-01</option>
<option>PC-02</option>
<option>PC-03</option>
</select>

<input placeholder="Prix du matériel">

<button>Enregistrer le prêt</button>

<button onclick="retour()">Retour</button>

</div>

<script>

let roleActuel="";

function connexion(){

roleActuel=
document.getElementById("role").value;

let nom=
document.getElementById("nom").value;

document.getElementById("login").style.display="none";
document.getElementById("menu").style.display="block";

document.getElementById("bonjour").innerHTML=
"Bienvenue "+nom+"<br>"+roleActuel;

if(
roleActuel==="Élève" ||
roleActuel==="Parent"
){
document.getElementById("appelBtn").style.display="none";
}

}

function ouvrir(id){

document.getElementById("menu").style.display="none";

document.querySelectorAll(".page").forEach(
p=>p.style.display="none"
);

document.getElementById(id).style.display="block";

}

function retour(){

document.querySelectorAll(".page").forEach(
p=>p.style.display="none"
);

document.getElementById("menu").style.display="block";

}

</script>

</body>
</html>
